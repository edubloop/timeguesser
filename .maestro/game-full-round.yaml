appId: host.exp.Exponent
---
# Flow: Complete one full round — photo loads, pin placed, year submitted, score revealed

- launchApp:
    clearState: true
- waitForAnimationToEnd

# Start a game
- tapOn:
    text: 'Start Game'
- waitForAnimationToEnd:
    timeout: 10000

# Verify photo loaded (not blank/placeholder)
- assertVisible:
    id: 'game-photo'
    optional: true

- extendedWaitUntil:
    visible:
      id: 'game-photo-loaded'
    timeout: 15000

# Enter map mode explicitly
- tapOn:
    id: 'guess-button'
- waitForAnimationToEnd
- assertVisible:
    id: 'photo-mode-chip'

# Place a pin somewhere on the map (center of screen as a proxy)
- tapOn:
    point: '50%,55%'

- waitForAnimationToEnd

# Confirm guess button should now be active
- tapOn:
    id: 'guess-button'

- waitForAnimationToEnd

# Year picker: enter and confirm a year
- inputText: '1975'
- tapOn:
    text: 'Confirm'

- waitForAnimationToEnd:
    timeout: 3000

# Score reveal should be visible
- assertVisible:
    id: 'score-reveal'
- takeScreenshot: score-reveal

# Continue to next round
- tapOn:
    id: 'next-round-button'
